name: Verify

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viewer/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Lint Viewer backend
        run: python -m ruff check viewer/backend

      - name: Test Viewer backend
        run: python -m unittest discover -s viewer/backend/tests

      - name: Test docs suite
        run: python -m unittest discover -s docs

      - name: Smoke test Viewer CLI
        run: python -m viewer.backend.cli --model-type linears --model linear --preset baseline --format json
