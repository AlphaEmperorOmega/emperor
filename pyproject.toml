[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "emperor"
version = "0.1.0"
description = "A PyTorch-based deep learning framework"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "CC-BY-NC-4.0" }
authors = [{ name = "Emperor", email = "emperor@example.com" }]
keywords = ["machine learning", "deep learning", "pytorch", "transformers"]
dependencies = [
  "torch",
  "torchvision",
  "torchtext",
  "torchmetrics",
  "transformers",
  "datasets",
  "matplotlib",
  "ipython",
  "tensorboard",
  "setuptools",
  "pandas",
  "ipykernel",
  "numpy",
  "lightning",
  "torchinfo",
  "gymnasium",
  "fastapi>=0.115,<0.116",
  "uvicorn[standard]>=0.34,<0.35",
  "pydantic-settings",
  "httpx>=0.28,<0.29",
]

[project.urls]
Homepage = "https://github.com/yourusername/emperor"
Repository = "https://github.com/yourusername/emperor"
Issues = "https://github.com/yourusername/emperor/issues"

[tool.setuptools.packages.find]
where = ["."]
