[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "emperor"
version = "0.1.0"
description = "A PyTorch-based deep learning framework"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "MIT" }
authors = [{ name = "Emperor", email = "emperor@example.com" }]
keywords = ["machine learning", "deep learning", "pytorch", "transformers"]
dependencies = [
  "torch",
  "torchvision",
  "transformers",
  "datasets",
  "matplotlib",
  "ipython",
  "tensorboard",
  "setuptools",
  "pandas",
  "ipykernel",
  "numpy",
  "lightning",
  "torchinfo",
]

[project.urls]
Homepage = "https://github.com/yourusername/emperor"
Repository = "https://github.com/yourusername/emperor"
Issues = "https://github.com/yourusername/emperor/issues"

[tool.setuptools.packages.find]
where = ["."]
